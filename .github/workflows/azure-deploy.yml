name: Deploy OR Management System to Azure App Service

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Debug repository structure
        run: |
          echo "Current directory:"
          pwd
          echo "Root files:"
          ls -la
          echo "Project folder files:"
          ls -la ORManagementSystem
          echo "Frontend files:"
          ls -la ORManagementSystem/ORManagement-Frontend
          echo "API project files:"
          ls -la ORManagementSystem/ORManagement.Api
          echo "Find package.json:"
          find . -name package.json
          echo "Find csproj files:"
          find . -name "*.csproj"
          echo "Find solution files:"
          find . -name "*.sln"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ORManagementSystem/ORManagement-Frontend
        run: npm ci

      - name: Build frontend
        working-directory: ORManagementSystem/ORManagement-Frontend
        run: npm run build
        env:
          VITE_API_BASE_URL: /api

      - name: Copy frontend build to API wwwroot
        run: |
          rm -rf ORManagementSystem/ORManagement.Api/wwwroot
          mkdir -p ORManagementSystem/ORManagement.Api/wwwroot
          cp -r ORManagementSystem/ORManagement-Frontend/dist/* ORManagementSystem/ORManagement.Api/wwwroot/

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore backend
        working-directory: ORManagementSystem
        run: dotnet restore ORManagementSystem.sln

      - name: Build backend
        working-directory: ORManagementSystem
        run: dotnet build ORManagementSystem.sln --configuration Release --no-restore

      - name: Publish backend
        run: dotnet publish ORManagementSystem/ORManagement.Api/ORManagement.Api.csproj --configuration Release --output ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: orm-management-demo-adithya
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish